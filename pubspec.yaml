name: seedycoffee
description: SeedyCoffee - Premium Coffee Shop App
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  supabase_flutter: ^2.8.4
  shared_preferences: ^2.3.3
  google_fonts: ^6.2.1
  smooth_page_indicator: ^1.2.1
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  crop_your_image: ^2.0.0
  qr_flutter: ^4.1.0
  fl_chart: ^0.70.2
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/LogoSeedy.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/images/LogoSeedy.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/BannerTest.png
    - assets/images/LogoSeedy.jpg
    - assets/icons/app_icon.svg
